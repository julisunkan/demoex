services:
  # ── Backend API ───────────────────────────────────────────────────────────────
  - type: web
    name: financial-data-analyzer-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

      # ── Azure AD / Microsoft SaaS Fulfillment ────────────────────────────────
      # Required for subscription verification and AppSource billing.
      # Get these from your Azure App Registration (see DEPLOYMENT_GUIDE.txt Part 2).
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false

      # ── Admin Panel ──────────────────────────────────────────────────────────
      # Protects the /admin route. Use a strong, random password.
      - key: ADMIN_PASSWORD
        sync: false

      # ── Session Security ─────────────────────────────────────────────────────
      # Long random string used to sign session cookies.
      # Generate with: openssl rand -base64 32
      - key: SESSION_SECRET
        sync: false

      # ── CORS ─────────────────────────────────────────────────────────────────
      # Set to your frontend static site URL so the API only accepts requests
      # from your own frontend. Example: https://financial-data-analyzer-app.onrender.com
      - key: FRONTEND_URL
        sync: false

      # ── Email Notifications (optional) ───────────────────────────────────────
      # Required only if you enable subscription renewal reminder emails in /admin.
      # Leave blank to disable email features.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  # ── Frontend Static Site ──────────────────────────────────────────────────────
  - type: static
    name: financial-data-analyzer-app
    buildCommand: npm install && npm run build
    staticPublishPath: dist/public
    envVars:
      # ── Backend URL ──────────────────────────────────────────────────────────
      # Set this to your backend service URL after it's deployed.
      # Example: https://financial-data-analyzer-api.onrender.com
      - key: VITE_API_URL
        sync: false

      # ── Azure AD (for Microsoft Sign-In) ─────────────────────────────────────
      # Same client ID as the backend. Tenant should be "common" to allow all
      # Microsoft accounts (personal + work/school).
      - key: VITE_AZURE_CLIENT_ID
        sync: false
      - key: VITE_AZURE_TENANT_ID
        value: common

      # ── AppSource Offer URL ───────────────────────────────────────────────────
      # Set after your offer is live on AppSource. Used for "Subscribe" buttons.
      # Example: https://appsource.microsoft.com/en-us/product/office/WA200012345
      - key: VITE_APPSOURCE_URL
        sync: false

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
